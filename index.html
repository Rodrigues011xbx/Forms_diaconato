<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4º Retiro Nacional de Diáconos 2026 - Inscrição</title>
    <meta name="description" content="Um tempo dedicado ao alinhamento do serviço diaconal, visão estratégica e formação ministerial.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
     <link rel="shortcut icon" href="./img/sign-form.png" type="image/x-icon">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="layout-grid">
        <aside class="image-side">
            <div class="image-container">
                <img src="./img/img-atual.jpeg" alt="4º Retiro Nacional de Diáconos 2026" class="hero-image">
                <div class="image-overlay"></div>
                <div class="floating-badge">
                    <i data-lucide="award"></i>
                    <span>Edição 2026</span>
                </div>
            </div>
        </aside>

        <div class="container container-form">
            <header>
                <h1>4º Retiro Nacional</h1>
                <p class="subtitle">de Diáconos 2026</p>
                <p class="subtitle" style="font-size: 0.85rem; margin-top: 0.5rem; line-height: 1.3;">Alinhamento, visão estratégica e formação ministerial.</p>
            </header>

            <main class="form-card" role="main">
                <!-- Progress Bar (Mobile Only) -->
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>

                <!-- Registration Form -->
                <form id="registrationForm" action="https://formsubmit.co/ajax/diaconato.maceio@gmail.com" method="POST" aria-labelledby="form-title">
                    <h2 id="form-title" class="sr-only">Formulário de Pesquisa</h2>
                    <!-- Config Hidden Fields -->
                    <input type="hidden" name="_subject" value="Nova inscrição - Retiro de Diáconos">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_template" value="table">
                    <input type="hidden" name="_next" value="" id="form-next">

                    <!-- Step 1: Nome -->
                    <div class="form-step active" data-step="1">
                        <div class="input-group">
                            <input type="text" id="nome" name="nome" placeholder=" " required aria-required="true">
                            <label for="nome">Nome completo</label>
                        </div>
                    </div>

                    <!-- Step 2: Cidade / Função -->
                    <div class="form-step" data-step="2">
                        <div class="input-row">
                            <div class="input-group">
                                <input type="text" id="cidade" name="cidade" placeholder=" " required aria-required="true">
                                <label for="cidade">Cidade</label>
                            </div>
                            <div class="input-group">
                                <input type="text" id="funcao" name="funcao" placeholder=" " required aria-required="true">
                                <label for="funcao">Função</label>
                            </div>
                        </div>
                    </div>

                    <!-- Step 3: Cobertura -->
                    <div class="form-step" data-step="3">
                        <div class="input-group">
                            <input type="text" id="cobertura" name="cobertura" placeholder=" " required aria-required="true">
                            <label for="cobertura">Cobertura (igreja/local)</label>
                        </div>
                    </div>

                    <!-- Step 4: Dificuldade -->
                    <div class="form-step" data-step="4">
                        <div class="input-group">
                            <textarea id="dificuldade" name="dificuldade" placeholder=" " required aria-required="true"></textarea>
                            <label for="dificuldade">Sua maior dificuldade hoje</label>
                        </div>
                    </div>

                    <!-- Navigation Buttons -->
                    <div class="form-navigation">
                        <button type="button" id="prevBtn" class="nav-btn secondary" style="display: none;">
                            <i data-lucide="chevron-left"></i>
                            <span>Voltar</span>
                        </button>
                        
                        <button type="button" id="nextBtn" class="nav-btn primary">
                            <span>Próximo</span>
                            <i data-lucide="chevron-right"></i>
                        </button>

                        <button type="submit" id="submitBtn" class="nav-btn submit-btn" style="display: none;">
                            <span>Finalizar Inscrição</span>
                            <i data-lucide="send"></i>
                            <div class="spinner" id="btnSpinner"></div>
                        </button>
                    </div>
                </form>

                <!-- Success State -->
                <div id="successMessage" class="success-msg" aria-live="polite">
                    <div class="success-icon">
                        <i data-lucide="check"></i>
                    </div>
                    <h2>Tudo pronto!</h2>
                    <p>Sua inscrição no 4º Retiro Nacional de Diáconos foi recebida com sucesso. Em breve entraremos em contato.</p>
                    <button onclick="resetForm()" class="refresh-btn" style="margin: 0 auto;">
                        Realizar outra inscrição
                    </button>
                </div>
            </main>

            <footer>
                <div style="margin-bottom: 0.25rem;">
                    <a href="admin.html" class="footer-link">Gestão Interna</a>
                </div>
                <div>
                    Diaconia no Brasil – 2026. <br>
                </div>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
